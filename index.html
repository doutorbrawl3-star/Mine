<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft App</title>
    
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <link rel="apple-touch-icon" href="icon.jpg">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3c8527">

    <style>
        body { 
            background-color: #1a1a1a; 
            color: #3c8527; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-top: 80px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 32px; text-shadow: 2px 2px #000; }
        img { 
            width: 180px; 
            height: 180px;
            border-radius: 25px; 
            border: 4px solid #3c8527;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            object-fit: cover;
            margin: 20px 0;
        }
        p { color: #888; font-size: 18px; }
    </style>
</head>
<body>

    <h1>MINECRAFT</h1>
    
    <img src="icon.jpg" alt="Ícone do App">
    
    <p>Pronto para jogar!</p>

</body>
</html>
